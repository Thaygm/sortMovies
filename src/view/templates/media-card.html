<div class="col-md-3 mb-4">
    <div class="card h-100 media-card shadow-sm">
        <div class="card-body d-flex flex-column">
            <h5 class="card-title text-truncate" title="{{title}}">{{title}}</h5>
            <h6 class="card-subtitle mb-2 text-muted small">{{category}} | {{type}}</h6>
            
            <div class="mt-auto">
                <p class="card-text mb-2">
                    <span class="text-warning"><i class="bi bi-star-fill"></i> {{rating}}</span>
                </p>
                
                <div class="progress mb-3" style="height: 5px;">
                    <div class="progress-bar bg-success" role="progressbar" 
                         style="width: calc({{score}} * 100%)"></div>
                </div>
                
                <button class="btn btn-outline-primary btn-sm w-100 watch-now-btn" 
                        data-media='{{media}}'>
                    <i class="bi bi-play-fill"></i> Assistir
                </button>
            </div>
        </div>
    </div>
</div>
